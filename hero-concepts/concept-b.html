<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept B — Editorial Streetwear</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bk:#0a0a0a;--wh:#fff;--rd:#e41e1e;--gm:rgba(255,255,255,.25);--gt:rgba(255,255,255,.45)}
body{background:var(--bk);color:var(--wh);font-family:'Space Mono',monospace;overflow-x:hidden}
.hero{position:relative;width:100%;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* Giant background word — editorial dominant */
.bg-word{position:absolute;top:42%;left:0;transform:translateY(-50%);font-family:'Anton',sans-serif;font-size:clamp(180px,22vw,420px);color:transparent;-webkit-text-stroke:2px rgba(255,255,255,.04);white-space:nowrap;pointer-events:none;z-index:0;user-select:none;width:100%;text-align:center;letter-spacing:20px}
/* Red vertical rule — editorial accent */
.v-rule{position:absolute;top:10%;left:50%;width:2px;height:80%;background:linear-gradient(180deg,transparent,var(--rd) 20%,var(--rd) 80%,transparent);opacity:.15;z-index:1;pointer-events:none}
/* Spotlight — angled from top-right */
.spot{position:absolute;top:-100px;right:15%;width:600px;height:800px;z-index:1;pointer-events:none}
.spot::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:24px;height:24px;background:rgba(255,240,200,.9);border-radius:50%;box-shadow:0 0 30px 12px rgba(255,240,200,.5),0 0 60px 25px rgba(255,220,150,.25),0 0 100px 40px rgba(255,200,100,.1)}
.spot::after{content:'';position:absolute;top:15px;left:50%;transform:translateX(-50%) rotate(-3deg);width:0;height:0;border-left:200px solid transparent;border-right:200px solid transparent;border-top:700px solid rgba(255,240,200,.03);filter:blur(25px)}
/* Particles */
.parts{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.pt{position:absolute;width:2px;height:2px;background:rgba(255,240,200,.4);border-radius:50%;animation:pf linear infinite}
@keyframes pf{0%{transform:translateY(100vh);opacity:0}10%{opacity:1}90%{opacity:.6}100%{transform:translateY(-10vh) translateX(var(--d));opacity:0}}
/* Main layout — editorial: text overlaps exhibit slightly */
.hc{position:relative;z-index:5;flex:1;display:grid;grid-template-columns:1.2fr 1fr;gap:40px;align-items:center;max-width:1440px;margin:0 auto;padding:80px 60px 30px;width:100%}
.left{display:flex;flex-direction:column;position:relative;z-index:6}
.eyebrow{font-size:11px;letter-spacing:5px;color:var(--rd);text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px}
.eyebrow-line{width:40px;height:1px;background:var(--rd)}
/* Massive editorial headline */
h1{font-family:'Anton',sans-serif;font-size:clamp(56px,7vw,120px);line-height:.85;text-transform:uppercase;letter-spacing:-2px;margin-bottom:8px}
h1 em{font-style:normal;color:var(--rd);display:block;font-size:1.1em}
/* Subtitle in Space Mono — editorial feel */
.tagline{font-family:'Space Mono',monospace;font-size:12px;letter-spacing:6px;color:var(--gt);text-transform:uppercase;margin-bottom:24px;padding-left:4px}
.sub{font-size:13px;line-height:1.7;color:var(--gt);max-width:420px;margin-bottom:20px}
.price{display:inline-flex;align-items:center;gap:8px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;border-left:3px solid var(--rd);padding:8px 20px;margin-bottom:32px;width:fit-content}
.price span{color:var(--gt);font-size:14px}
.cta-row{display:flex;gap:16px;flex-wrap:wrap}
.cta-p{display:inline-flex;align-items:center;gap:10px;background:var(--rd);color:var(--wh);padding:16px 36px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:all .2s}
.cta-p:hover{background:#b81818;transform:translateY(-2px);box-shadow:0 8px 32px rgba(228,30,30,.3)}
.cta-s{display:inline-flex;align-items:center;background:transparent;color:var(--wh);padding:16px 36px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:1px solid rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.cta-s:hover{border-color:var(--wh);background:rgba(255,255,255,.05)}
/* Right — exhibition with editorial overlap */
.right{display:flex;align-items:center;justify-content:center;position:relative}
.exhibit{position:relative;display:flex;flex-direction:column;align-items:center}
/* Frame — thinner, more editorial */
.frame{position:relative;width:380px;max-width:100%;aspect-ratio:3.5/4;background:#0e0e0e;border:4px solid #1a1a1a;box-shadow:inset 0 0 50px rgba(0,0,0,.7),0 20px 50px rgba(0,0,0,.5),0 0 80px rgba(255,240,200,.02);display:flex;align-items:center;justify-content:center;overflow:hidden}
.frame::before{content:'';position:absolute;inset:6px;border:1px solid rgba(255,255,255,.03);pointer-events:none;z-index:2}
.frame::after{content:'';position:absolute;top:0;right:0;width:50%;height:35%;background:linear-gradient(135deg,rgba(255,240,200,.05),transparent 55%);pointer-events:none;z-index:3}
.accent{position:absolute;top:-2px;left:-2px;z-index:10;pointer-events:none}
.accent::before{content:'';position:absolute;top:0;left:0;width:50px;height:5px;background:var(--rd)}
.accent::after{content:'';position:absolute;top:0;left:0;width:5px;height:50px;background:var(--rd)}
.frame img{width:75%;height:78%;object-fit:contain;z-index:1;filter:drop-shadow(0 6px 25px rgba(0,0,0,.3));transition:transform .6s cubic-bezier(.16,1,.3,1)}
.frame:hover img{transform:scale(1.04)}
/* Editorial label overlapping frame */
.frame-label{position:absolute;bottom:-12px;right:-12px;font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:var(--bk);background:var(--wh);padding:8px 16px;z-index:11;text-transform:uppercase}
/* Pedestal */
.ped{position:relative;width:420px;max-width:110%;margin-top:-2px}
.ped-t{width:100%;height:12px;background:linear-gradient(180deg,#1a1a1a,#121212);border:1px solid rgba(255,255,255,.04);border-bottom:none}
.ped-a{width:100%;height:3px;background:var(--rd);box-shadow:0 0 12px rgba(228,30,30,.25)}
.ped-b{width:100%;height:20px;background:linear-gradient(180deg,#131313,#0b0b0b);border:1px solid rgba(255,255,255,.02);border-top:none}
.ped-s{width:85%;height:25px;margin:3px auto 0;background:radial-gradient(ellipse at center,rgba(0,0,0,.5),transparent 70%)}
/* Editorial sidebar text — rotated */
.side-text{position:absolute;right:-50px;top:50%;transform:rotate(90deg) translateX(-50%);font-family:'Space Mono',monospace;font-size:9px;letter-spacing:6px;color:var(--gm);text-transform:uppercase;white-space:nowrap;transform-origin:right center;z-index:6}
/* Category strip */
.cats{position:relative;z-index:10;width:100%;max-width:1440px;margin:0 auto;padding:0 60px 40px;display:flex;align-items:center;justify-content:center;gap:0}
.ci{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--gm);text-transform:uppercase;padding:12px 22px;cursor:pointer;transition:color .2s;position:relative;text-decoration:none;border:none;background:none}
.ci:hover{color:rgba(255,255,255,.7)}
.ci.on{color:var(--wh)}
.ci.on::after{content:'';position:absolute;bottom:4px;left:22px;right:22px;height:2px;background:var(--rd);box-shadow:0 0 8px rgba(228,30,30,.4)}
.cd{width:1px;height:16px;background:rgba(255,255,255,.08)}
/* Scroll */
.sc{position:absolute;bottom:30px;left:60px;display:flex;align-items:center;gap:12px;font-size:10px;letter-spacing:3px;color:var(--gm);z-index:10}
.sl{width:40px;height:1px;background:rgba(255,255,255,.15);position:relative;overflow:hidden}
.sl::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--wh);animation:sp 2s ease-in-out infinite}
@keyframes sp{0%{left:-100%}50%{left:100%}100%{left:100%}}
.tag{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:4px;color:var(--rd);background:rgba(10,10,10,.85);border:1px solid rgba(228,30,30,.3);padding:8px 24px;z-index:999;text-transform:uppercase}
@media(max-width:1024px){.hc{grid-template-columns:1fr;padding:100px 32px 30px;gap:36px;text-align:center}.left{align-items:center}.eyebrow{justify-content:center}.sub{margin:0 auto 20px}.cta-row{justify-content:center}.right{order:-1}.frame{width:300px}.ped{width:340px}.cats{padding:0 20px 30px;flex-wrap:wrap}.bg-word{font-size:clamp(100px,18vw,260px)}.sc{display:none}.side-text{display:none}.v-rule{display:none}}
@media(max-width:640px){.hc{padding:80px 20px 20px;gap:28px}h1{font-size:clamp(40px,11vw,56px)}.frame{width:260px}.ped{width:290px}.ci{padding:10px 10px;font-size:12px;letter-spacing:2px}}
</style>
</head>
<body>
<div class="tag">Concept B — Editorial Streetwear</div>
<section class="hero">
<div class="bg-word" aria-hidden="true">VISION</div>
<div class="v-rule" aria-hidden="true"></div>
<div class="spot" aria-hidden="true"></div>
<div class="parts" aria-hidden="true">
<div class="pt" style="left:50%;animation-duration:9s;--d:20px"></div>
<div class="pt" style="left:58%;animation-duration:12s;animation-delay:2s;--d:-18px"></div>
<div class="pt" style="left:64%;animation-duration:8s;animation-delay:1s;--d:15px"></div>
<div class="pt" style="left:55%;animation-duration:14s;animation-delay:3s;--d:-12px"></div>
<div class="pt" style="left:70%;animation-duration:10s;animation-delay:.5s;--d:22px"></div>
<div class="pt" style="left:48%;animation-duration:11s;animation-delay:4s;--d:-16px"></div>
</div>
<div class="hc">
<div class="left">
<div class="eyebrow"><span class="eyebrow-line"></span>URBANEX · DROP 01</div>
<h1>THE<br><em>SNEAKER</em><br>EDIT</h1>
<div class="tagline">STREET CERTIFIED · LIMITED RUN</div>
<p class="sub">Premium kicks curated for the culture. Verified original, shipped fast across India.</p>
<div class="price"><span>From</span> ₹4,499</div>
<div class="cta-row">
<a href="#" class="cta-p">SHOP THE DROP →</a>
<a href="#" class="cta-s">EXPLORE ALL</a>
</div>
</div>
<div class="right">
<div class="exhibit">
<div class="frame">
<div class="accent"></div>
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=800&q=80" alt="Sneaker">
<div class="frame-label">NEW DROP 2026</div>
</div>
<div class="ped">
<div class="ped-t"></div>
<div class="ped-a"></div>
<div class="ped-b"></div>
</div>
<div class="ped-s"></div>
</div>
<div class="side-text">URBANEX — EST. STREETWEAR — 2026</div>
</div>
</div>
<div class="cats">
<button class="ci on">SNEAKERS</button><div class="cd"></div>
<button class="ci">WATCHES</button><div class="cd"></div>
<button class="ci">GLASSES</button><div class="cd"></div>
<button class="ci">HANDBAGS</button><div class="cd"></div>
<button class="ci">ACCESSORIES</button>
</div>
<div class="sc"><div class="sl"></div>SCROLL TO EXPLORE</div>
</section>
</body>
</html>
