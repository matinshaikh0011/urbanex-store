<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept C — Urbanex Signature</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bk:#0a0a0a;--wh:#fff;--rd:#e41e1e;--gm:rgba(255,255,255,.25);--gt:rgba(255,255,255,.45)}
body{background:var(--bk);color:var(--wh);font-family:'Space Mono',monospace;overflow-x:hidden}
.hero{position:relative;width:100%;min-height:100vh;display:flex;flex-direction:column;overflow:hidden}
/* Background word — balanced scale */
.bg-word{position:absolute;top:48%;left:50%;transform:translate(-50%,-50%);font-family:'Anton',sans-serif;font-size:clamp(160px,24vw,440px);color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,.03);white-space:nowrap;pointer-events:none;z-index:0;user-select:none}
/* Subtle grid overlay */
.grid-overlay{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;z-index:0;mask-image:radial-gradient(ellipse 70% 70% at 55% 50%,#000 30%,transparent 100%);-webkit-mask-image:radial-gradient(ellipse 70% 70% at 55% 50%,#000 30%,transparent 100%)}
/* Spotlight — warm, physical, from upper right */
.spot{position:absolute;top:-80px;right:16%;width:560px;height:750px;z-index:1;pointer-events:none}
.spot-bulb{position:absolute;top:0;left:50%;transform:translateX(-50%);width:28px;height:28px;background:rgba(255,240,200,.9);border-radius:50%;box-shadow:0 0 35px 12px rgba(255,240,200,.55),0 0 70px 28px rgba(255,220,150,.25),0 0 110px 45px rgba(255,200,100,.12)}
.spot-cone{position:absolute;top:18px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:170px solid transparent;border-right:170px solid transparent;border-top:640px solid rgba(255,240,200,.035);filter:blur(22px)}
.spot-cone2{position:absolute;top:25px;left:52%;transform:translateX(-50%);width:0;height:0;border-left:90px solid transparent;border-right:90px solid transparent;border-top:520px solid rgba(255,240,200,.02);filter:blur(8px)}
/* Ambient glow on exhibit area */
.amb{position:absolute;top:30%;right:10%;width:500px;height:500px;background:radial-gradient(circle,rgba(255,240,200,.025),transparent 65%);pointer-events:none;z-index:1}
/* Particles */
.parts{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.pt{position:absolute;width:2px;height:2px;background:rgba(255,240,200,.45);border-radius:50%;animation:pf linear infinite}
@keyframes pf{0%{transform:translateY(100vh);opacity:0}10%{opacity:1}90%{opacity:.5}100%{transform:translateY(-10vh) translateX(var(--d));opacity:0}}
/* Layout */
.hc{position:relative;z-index:5;flex:1;display:grid;grid-template-columns:1fr 1.05fr;gap:50px;align-items:center;max-width:1400px;margin:0 auto;padding:80px 60px 20px;width:100%}
/* Left */
.left{display:flex;flex-direction:column}
.eyebrow{font-size:11px;letter-spacing:5px;color:var(--rd);text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;gap:10px}
.eyebrow::before{content:'';width:28px;height:1px;background:var(--rd)}
h1{font-family:'Anton',sans-serif;font-size:clamp(50px,6vw,96px);line-height:.9;text-transform:uppercase;letter-spacing:-1px;margin-bottom:20px}
h1 em{font-style:normal;color:var(--rd)}
.sub{font-size:13px;line-height:1.7;color:var(--gt);max-width:400px;margin-bottom:24px}
.price{display:inline-flex;align-items:center;gap:10px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;border:1px solid rgba(255,255,255,.12);padding:10px 20px;margin-bottom:30px;width:fit-content}
.price span{color:var(--gt);font-size:13px}
.cta-row{display:flex;gap:16px;flex-wrap:wrap}
.cta-p{display:inline-flex;align-items:center;gap:10px;background:var(--rd);color:var(--wh);padding:16px 36px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.cta-p::before{content:'';position:absolute;top:0;left:-120%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.2),transparent);transform:skewX(-20deg);transition:left .5s}
.cta-p:hover::before{left:130%}
.cta-p:hover{background:#b81818;transform:translateY(-2px);box-shadow:0 8px 32px rgba(228,30,30,.3)}
.cta-s{display:inline-flex;align-items:center;background:transparent;color:var(--wh);padding:16px 36px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:1px solid rgba(255,255,255,.2);cursor:pointer;transition:all .2s}
.cta-s:hover{border-color:var(--wh);background:rgba(255,255,255,.05)}
/* Right — Exhibition */
.right{display:flex;align-items:center;justify-content:center;position:relative}
.exhibit{position:relative;display:flex;flex-direction:column;align-items:center}
/* Gallery frame — signature Urbanex style */
.frame{position:relative;width:390px;max-width:100%;aspect-ratio:4/4.2;background:#0e0e0e;border:5px solid #1a1a1a;box-shadow:inset 0 0 50px rgba(0,0,0,.75),inset 0 0 120px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.03),0 20px 60px rgba(0,0,0,.5),0 0 80px rgba(255,240,200,.025);display:flex;align-items:center;justify-content:center;overflow:hidden}
/* Inner border — depth */
.frame::before{content:'';position:absolute;inset:7px;border:1px solid rgba(255,255,255,.035);pointer-events:none;z-index:2}
/* Spotlight reflection on frame top */
.frame::after{content:'';position:absolute;top:0;right:0;width:55%;height:35%;background:linear-gradient(135deg,rgba(255,240,200,.05),transparent 55%);pointer-events:none;z-index:3}
/* Red L-shaped accent — signature motif */
.accent{position:absolute;top:-2px;left:-2px;z-index:10;pointer-events:none}
.accent::before{content:'';position:absolute;top:0;left:0;width:55px;height:5px;background:var(--rd);box-shadow:0 0 10px rgba(228,30,30,.2)}
.accent::after{content:'';position:absolute;top:0;left:0;width:5px;height:55px;background:var(--rd);box-shadow:0 0 10px rgba(228,30,30,.2)}
/* Secondary accent — bottom-right corner (subtle brand echo) */
.accent2{position:absolute;bottom:-2px;right:-2px;z-index:10;pointer-events:none}
.accent2::before{content:'';position:absolute;bottom:0;right:0;width:30px;height:3px;background:rgba(228,30,30,.3)}
.accent2::after{content:'';position:absolute;bottom:0;right:0;width:3px;height:30px;background:rgba(228,30,30,.3)}
.frame img{width:78%;height:78%;object-fit:contain;z-index:1;filter:drop-shadow(0 8px 28px rgba(0,0,0,.35));transition:transform .6s cubic-bezier(.16,1,.3,1)}
.frame:hover img{transform:scale(1.04) rotate(.5deg)}
/* Pedestal — physical grounded */
.ped{position:relative;width:430px;max-width:110%;margin-top:-2px}
.ped-t{width:100%;height:12px;background:linear-gradient(180deg,#1b1b1b,#131313);border:1px solid rgba(255,255,255,.045);border-bottom:none}
.ped-a{width:100%;height:3px;background:linear-gradient(90deg,transparent 5%,var(--rd) 15%,var(--rd) 85%,transparent 95%);box-shadow:0 0 14px rgba(228,30,30,.3)}
.ped-b{width:100%;height:22px;background:linear-gradient(180deg,#141414,#0c0c0c);border:1px solid rgba(255,255,255,.025);border-top:none}
.ped-s{width:88%;height:28px;margin:3px auto 0;background:radial-gradient(ellipse at center,rgba(0,0,0,.55),transparent 70%)}
/* Category strip — integrated */
.cats{position:relative;z-index:10;width:100%;max-width:1400px;margin:0 auto;padding:0 60px 36px;display:flex;align-items:center;justify-content:center;gap:0}
.cl{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:3px;color:var(--gm);margin-right:28px}
.cl::after{content:'';width:1px;height:22px;background:rgba(255,255,255,.08);margin-left:14px}
.ci{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--gm);text-transform:uppercase;padding:12px 20px;cursor:pointer;transition:color .2s;position:relative;text-decoration:none;border:none;background:none}
.ci:hover{color:rgba(255,255,255,.7)}
.ci.on{color:var(--wh)}
.ci.on::after{content:'';position:absolute;bottom:4px;left:20px;right:20px;height:2px;background:var(--rd);box-shadow:0 0 8px rgba(228,30,30,.4)}
.cd{width:1px;height:16px;background:rgba(255,255,255,.08)}
/* Scroll cue — minimal with arrow */
.sc{position:absolute;bottom:28px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--gm);z-index:10}
.sa{width:10px;height:10px;border-right:1.5px solid var(--gm);border-bottom:1.5px solid var(--gm);transform:rotate(45deg);animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:rotate(45deg) translate(0,0);opacity:1}50%{transform:rotate(45deg) translate(3px,3px);opacity:.4}}
.tag{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:4px;color:var(--rd);background:rgba(10,10,10,.85);border:1px solid rgba(228,30,30,.3);padding:8px 24px;z-index:999;text-transform:uppercase;white-space:nowrap}
@media(max-width:1024px){.hc{grid-template-columns:1fr;padding:90px 32px 20px;gap:36px;text-align:center}.left{align-items:center}.eyebrow{justify-content:center}.sub{margin:0 auto 24px}.cta-row{justify-content:center}.right{order:-1}.frame{width:310px}.ped{width:350px}.cats{padding:0 20px 30px;flex-wrap:wrap}.cl{display:none}.bg-word{font-size:clamp(100px,18vw,260px)}.sc{bottom:16px}}
@media(max-width:640px){.hc{padding:70px 20px 16px;gap:26px}h1{font-size:clamp(38px,10vw,52px)}.frame{width:270px}.ped{width:300px}.ci{padding:10px 10px;font-size:12px;letter-spacing:2px}.cta-p,.cta-s{padding:14px 28px;font-size:16px}}
</style>
</head>
<body>
<div class="tag">Concept C — Urbanex Signature</div>
<section class="hero">
<div class="bg-word" aria-hidden="true">PREMIUM</div>
<div class="grid-overlay" aria-hidden="true"></div>
<div class="spot" aria-hidden="true">
<div class="spot-bulb"></div>
<div class="spot-cone"></div>
<div class="spot-cone2"></div>
</div>
<div class="amb" aria-hidden="true"></div>
<div class="parts" aria-hidden="true">
<div class="pt" style="left:52%;animation-duration:9s;--d:18px"></div>
<div class="pt" style="left:58%;animation-duration:12s;animation-delay:1.5s;--d:-14px"></div>
<div class="pt" style="left:64%;animation-duration:8s;animation-delay:2.5s;--d:22px"></div>
<div class="pt" style="left:56%;animation-duration:14s;animation-delay:.8s;--d:-10px"></div>
<div class="pt" style="left:68%;animation-duration:10s;animation-delay:3s;--d:16px"></div>
<div class="pt" style="left:50%;animation-duration:11s;animation-delay:4s;--d:-20px"></div>
<div class="pt" style="left:72%;animation-duration:9s;animation-delay:1s;--d:12px;width:3px;height:3px"></div>
</div>
<div class="hc">
<div class="left">
<div class="eyebrow">URBANEX · DROP 02</div>
<h1>TIME PIECE<br><em>EDIT</em></h1>
<p class="sub">Curated timepieces for the ones who move different.</p>
<div class="price"><span>From</span> ₹3,999</div>
<div class="cta-row">
<a href="#" class="cta-p">SHOP THE DROP →</a>
<a href="#" class="cta-s">EXPLORE ALL</a>
</div>
</div>
<div class="right">
<div class="exhibit">
<div class="frame">
<div class="accent"></div>
<div class="accent2"></div>
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&q=80" alt="Watch">
</div>
<div class="ped">
<div class="ped-t"></div>
<div class="ped-a"></div>
<div class="ped-b"></div>
</div>
<div class="ped-s"></div>
</div>
</div>
</div>
<div class="cats">
<div class="cl">CURATED · PREMIUM · STREET</div>
<button class="ci">SNEAKERS</button><div class="cd"></div>
<button class="ci on">WATCHES</button><div class="cd"></div>
<button class="ci">GLASSES</button><div class="cd"></div>
<button class="ci">HANDBAGS</button><div class="cd"></div>
<button class="ci">ACCESSORIES</button>
</div>
<div class="sc"><div class="sa"></div>SCROLL TO EXPLORE</div>
</section>
</body>
</html>
