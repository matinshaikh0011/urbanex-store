<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Concept A — Luxury Exhibition</title>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bk:#0a0a0a;--wh:#fff;--rd:#e41e1e;--gm:rgba(255,255,255,.25);--gt:rgba(255,255,255,.45)}
body{background:var(--bk);color:var(--wh);font-family:'Space Mono',monospace;overflow-x:hidden}
.hero{position:relative;width:100%;min-height:100vh;display:flex;flex-direction:column;overflow:hidden;isolation:isolate}
.bg-word{position:absolute;top:50%;left:50%;transform:translate(-50%,-55%);font-family:'Anton',sans-serif;font-size:clamp(200px,28vw,500px);color:transparent;-webkit-text-stroke:1.5px rgba(255,255,255,.035);white-space:nowrap;pointer-events:none;z-index:0;user-select:none}
.spotlight{position:absolute;top:-80px;right:18%;width:500px;height:700px;z-index:1;pointer-events:none}
.spotlight::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:30px;height:30px;background:rgba(255,240,200,.95);border-radius:50%;box-shadow:0 0 40px 15px rgba(255,240,200,.6),0 0 80px 30px rgba(255,220,150,.3),0 0 120px 50px rgba(255,200,100,.15)}
.spotlight::after{content:'';position:absolute;top:20px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:180px solid transparent;border-right:180px solid transparent;border-top:650px solid rgba(255,240,200,.04);filter:blur(30px)}
.spotlight-cone{position:absolute;top:-60px;right:20%;width:320px;height:600px;z-index:1;pointer-events:none}
.spotlight-cone::after{content:'';position:absolute;top:30px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:100px solid transparent;border-right:100px solid transparent;border-top:550px solid rgba(255,240,200,.025);filter:blur(10px)}
.particles{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
.particle{position:absolute;width:2px;height:2px;background:rgba(255,240,200,.5);border-radius:50%;animation:pf linear infinite}
@keyframes pf{0%{transform:translateY(100vh) translateX(0);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-10vh) translateX(var(--d));opacity:0}}
.hc{position:relative;z-index:5;flex:1;display:grid;grid-template-columns:1fr 1.1fr;gap:60px;align-items:center;max-width:1400px;margin:0 auto;padding:80px 60px 30px;width:100%}
.left{display:flex;flex-direction:column}
.eyebrow{font-size:12px;letter-spacing:4px;color:var(--rd);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:12px}
.eyebrow::before{content:'';width:24px;height:1px;background:var(--rd)}
h1{font-family:'Anton',sans-serif;font-size:clamp(48px,5.5vw,88px);line-height:.92;text-transform:uppercase;letter-spacing:-1px;margin-bottom:24px}
h1 em{font-style:normal;color:var(--rd)}
.sub{font-size:13px;line-height:1.7;color:var(--gt);max-width:380px;margin-bottom:28px}
.price{display:inline-flex;align-items:center;gap:8px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;border:1px solid rgba(255,255,255,.15);padding:10px 20px;margin-bottom:32px;width:fit-content}
.price span{color:var(--gt);font-size:14px}
.cta-row{display:flex;gap:16px;flex-wrap:wrap}
.cta-p{display:inline-flex;align-items:center;gap:10px;background:var(--rd);color:var(--wh);padding:16px 36px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:none;cursor:pointer;transition:all .2s}
.cta-p:hover{background:#b81818;transform:translateY(-2px);box-shadow:0 8px 32px rgba(228,30,30,.3)}
.cta-s{display:inline-flex;align-items:center;background:transparent;color:var(--wh);padding:16px 36px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;text-transform:uppercase;text-decoration:none;border:1px solid rgba(255,255,255,.25);cursor:pointer;transition:all .2s}
.cta-s:hover{border-color:var(--wh);background:rgba(255,255,255,.05)}
.right{display:flex;align-items:center;justify-content:center;position:relative}
.exhibit{position:relative;display:flex;flex-direction:column;align-items:center}
.frame{position:relative;width:400px;max-width:100%;aspect-ratio:4/4.5;background:#111;border:6px solid #1a1a1a;box-shadow:inset 0 0 60px rgba(0,0,0,.8),0 0 0 1px rgba(255,255,255,.04),0 20px 60px rgba(0,0,0,.5),0 0 100px rgba(255,240,200,.03);display:flex;align-items:center;justify-content:center;overflow:hidden}
.frame::before{content:'';position:absolute;inset:8px;border:1px solid rgba(255,255,255,.04);pointer-events:none;z-index:2}
.frame::after{content:'';position:absolute;top:0;right:0;width:60%;height:40%;background:linear-gradient(135deg,rgba(255,240,200,.06),transparent 60%);pointer-events:none;z-index:3}
.accent{position:absolute;top:-3px;left:-3px;z-index:10;pointer-events:none}
.accent::before{content:'';position:absolute;top:0;left:0;width:60px;height:6px;background:var(--rd)}
.accent::after{content:'';position:absolute;top:0;left:0;width:6px;height:60px;background:var(--rd)}
.frame img{width:80%;height:80%;object-fit:contain;z-index:1;filter:drop-shadow(0 8px 30px rgba(0,0,0,.3));transition:transform .6s cubic-bezier(.16,1,.3,1)}
.frame:hover img{transform:scale(1.04)}
.ped{position:relative;width:440px;max-width:110%;margin-top:-2px}
.ped-t{width:100%;height:14px;background:linear-gradient(180deg,#1c1c1c,#141414);border:1px solid rgba(255,255,255,.05);border-bottom:none}
.ped-a{width:100%;height:3px;background:var(--rd);box-shadow:0 0 15px rgba(228,30,30,.3)}
.ped-b{width:100%;height:24px;background:linear-gradient(180deg,#151515,#0d0d0d);border:1px solid rgba(255,255,255,.03);border-top:none}
.ped-s{width:90%;height:30px;margin:4px auto 0;background:radial-gradient(ellipse at center,rgba(0,0,0,.6),transparent 70%)}
.cats{position:relative;z-index:10;width:100%;max-width:1400px;margin:0 auto;padding:0 60px 40px;display:flex;align-items:center;justify-content:flex-end;gap:0}
.cl{display:flex;align-items:center;gap:6px;font-size:11px;letter-spacing:3px;color:var(--gm);margin-right:32px}
.cl::after{content:'';width:1px;height:24px;background:rgba(255,255,255,.1);margin-left:16px}
.ci{font-family:'Bebas Neue',sans-serif;font-size:15px;letter-spacing:3px;color:var(--gm);text-transform:uppercase;padding:12px 20px;cursor:pointer;transition:color .2s;position:relative;text-decoration:none;border:none;background:none}
.ci:hover{color:rgba(255,255,255,.7)}
.ci.on{color:var(--wh)}
.ci.on::after{content:'';position:absolute;bottom:4px;left:20px;right:20px;height:2px;background:var(--rd);box-shadow:0 0 8px rgba(228,30,30,.4)}
.cd{width:1px;height:16px;background:rgba(255,255,255,.08)}
.sc{position:absolute;bottom:30px;left:60px;display:flex;align-items:center;gap:12px;font-size:10px;letter-spacing:3px;color:var(--gm);z-index:10}
.sl{width:40px;height:1px;background:rgba(255,255,255,.15);position:relative;overflow:hidden}
.sl::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:var(--wh);animation:sp 2s ease-in-out infinite}
@keyframes sp{0%{left:-100%}50%{left:100%}100%{left:100%}}
.tag{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-size:11px;letter-spacing:4px;color:var(--rd);background:rgba(10,10,10,.85);border:1px solid rgba(228,30,30,.3);padding:8px 24px;z-index:999;text-transform:uppercase}
@media(max-width:1024px){.hc{grid-template-columns:1fr;padding:100px 32px 30px;gap:40px;text-align:center}.left{align-items:center}.eyebrow{justify-content:center}.sub{margin:0 auto 28px}.cta-row{justify-content:center}.right{order:-1}.frame{width:320px}.ped{width:360px}.cats{justify-content:center;padding:0 20px 30px}.cl{display:none}.bg-word{font-size:clamp(120px,20vw,300px)}.sc{display:none}}
@media(max-width:640px){.hc{padding:80px 20px 20px;gap:30px}h1{font-size:clamp(36px,10vw,52px)}.frame{width:280px}.ped{width:310px}.ci{padding:10px 12px;font-size:13px;letter-spacing:2px}}
</style>
</head>
<body>
<div class="tag">Concept A — Luxury Exhibition</div>
<section class="hero">
<div class="bg-word" aria-hidden="true">STREET</div>
<div class="spotlight" aria-hidden="true"></div>
<div class="spotlight-cone" aria-hidden="true"></div>
<div class="particles" aria-hidden="true">
<div class="particle" style="left:55%;animation-duration:8s;--d:20px"></div>
<div class="particle" style="left:60%;animation-duration:11s;animation-delay:1.5s;--d:-15px"></div>
<div class="particle" style="left:65%;animation-duration:9s;animation-delay:3s;--d:25px"></div>
<div class="particle" style="left:58%;animation-duration:13s;animation-delay:.5s;--d:-10px"></div>
<div class="particle" style="left:70%;animation-duration:10s;animation-delay:2s;--d:18px"></div>
<div class="particle" style="left:52%;animation-duration:7s;animation-delay:4s;--d:-22px"></div>
<div class="particle" style="left:62%;animation-duration:12s;animation-delay:1s;--d:12px"></div>
<div class="particle" style="left:68%;animation-duration:9s;animation-delay:3.5s;--d:-8px"></div>
</div>
<div class="hc">
<div class="left">
<div class="eyebrow">URBANEX · DROP 01</div>
<h1>TIME PIECE<br><em>EDIT</em></h1>
<p class="sub">Curated timepieces for the ones who move different.</p>
<div class="price"><span>From</span> ₹3,999</div>
<div class="cta-row">
<a href="#" class="cta-p">SHOP THE DROP →</a>
<a href="#" class="cta-s">EXPLORE ALL</a>
</div>
</div>
<div class="right">
<div class="exhibit">
<div class="frame">
<div class="accent"></div>
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=800&q=80" alt="Watch">
</div>
<div class="ped">
<div class="ped-t"></div>
<div class="ped-a"></div>
<div class="ped-b"></div>
</div>
<div class="ped-s"></div>
</div>
</div>
</div>
<div class="cats">
<div class="cl">CURATED · PREMIUM · STREET</div>
<button class="ci">SNEAKERS</button><div class="cd"></div>
<button class="ci on">WATCHES</button><div class="cd"></div>
<button class="ci">GLASSES</button><div class="cd"></div>
<button class="ci">HANDBAGS</button><div class="cd"></div>
<button class="ci">ACCESSORIES</button>
</div>
<div class="sc"><div class="sl"></div>SCROLL TO EXPLORE</div>
</section>
</body>
</html>
